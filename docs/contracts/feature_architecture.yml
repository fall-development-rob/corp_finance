# Feature Contract: Architecture Rules
# Enforces structural and security rules across the CFA agent codebase

contracts:
  - id: ARCH-001
    name: "No direct math in agents"
    description: "Agent files must not contain direct mathematical computations. All calculations must be delegated to corp-finance-mcp tools via MCP calls."
    scope:
      - "packages/agents/agents/*.md"
    enforcement: build-time
    severity: error

  - id: ARCH-002
    name: "No secrets in source"
    description: "Source files must not contain hardcoded API keys, passwords, tokens, or credentials. Use environment variables."
    scope:
      - "packages/agents/src/**/*.ts"
      - "packages/mcp-server/src/**/*.ts"
    enforcement: build-time
    severity: error

  - id: ARCH-003
    name: "500-line file limit"
    description: "No single source file may exceed 500 lines. Split into modules if approaching the limit."
    scope:
      - "packages/agents/src/**/*.ts"
    enforcement: build-time
    severity: error

  - id: ARCH-004
    name: "No direct DB writes from agents"
    description: "Agent code must not write directly to databases. Use the memory layer (FinancialMemory, ReasoningBank) or MCP tools."
    scope:
      - "packages/agents/agents/*.md"
      - "packages/agents/src/**/*.ts"
    enforcement: build-time
    severity: error

  - id: ARCH-005
    name: "System prompts required for all agents"
    description: "Every agent definition must include a systemPrompt field. Agents without system prompts cannot enforce behavioral constraints."
    scope:
      - "packages/agents/agents/*.md"
    enforcement: build-time
    severity: error

  - id: ARCH-006
    name: "Typed interfaces for public APIs"
    description: "All exported functions and classes must use TypeScript interfaces or type aliases for parameters and return values. No 'any' in public signatures."
    scope:
      - "packages/agents/src/**/*.ts"
    enforcement: review
    severity: warning

  - id: ARCH-007
    name: "Workflow skills follow consolidation pattern"
    description: "Workflow skills consolidate multiple atomic workflows into domain-level skills (1 skill per domain, not 1 per workflow). Maximum 6 workflow skills."
    scope:
      - ".claude/skills/workflow-*/SKILL.md"
    enforcement: review
    severity: warning

  - id: ARCH-008
    name: "Workflow Rust auditability (ADR-009)"
    description: "All workflow definitions are static Rust constants with compile-time types"
    scope:
      - "crates/corp-finance-core/src/workflows/"
    enforcement: build-time
    severity: error

  - id: ARCH-009
    name: "Multi-source data integration"
    description: "Each data source has a separate MCP server package, bridge, and skill file"
    scope:
      - "packages/*-mcp-server/**"
      - ".claude/skills/data-*/**"
      - ".claude/skills/vendor-*/**"
    enforcement: review
    severity: warning
    rules:
      - "Free data sources get their own packages/xxx-mcp-server/ directory"
      - "Vendor integrations are config-only with skill documentation"
      - "All data tools use source-prefixed snake_case naming (fred_, edgar_, figi_, yf_, wb_)"
      - "Data skills follow data-* naming convention"
      - "Vendor skills follow vendor-* naming convention"

invariants:
  - id: ARCH-INV-001
    name: "Total skill count"
    description: "There must be exactly 60 skills (43 existing + 6 workflow + 5 data + 6 vendor)"
    check: "count(.claude/skills/*/SKILL.md) == 60"
