# Feature Contract: Agent Routing Rules
# Enforces routing and delegation patterns for multi-agent coordination

contracts:
  - id: ROUTE-001
    name: "System prompts required"
    description: "Every agent definition in the agents/ directory must include a system prompt that defines the agent's role, capabilities, and constraints."
    scope:
      - "packages/agents/agents/*.md"
    enforcement: build-time
    severity: error

  - id: ROUTE-002
    name: "No hardcoded routing"
    description: "Agent routing must use the SemanticRouter (HNSW-based) or ChiefAnalyst fallback classifier. Hardcoded if/else routing chains are not permitted."
    scope:
      - "packages/agents/src/pipeline.ts"
    enforcement: build-time
    severity: error

  - id: ROUTE-003
    name: "Intent definitions must have examples"
    description: "Every CFA_INTENTS entry must include at least 2 example queries and at least 3 tags for HNSW indexing accuracy."
    scope:
      - "packages/agents/src/pipeline.ts"
    enforcement: build-time
    severity: error

invariants:
  - id: ROUTE-INV-001
    name: "All agents have data skills"
    description: "At least 5 agents in AGENT_SKILLS reference at least one data-* or geopolitical-* skill"
    check: "count(AGENT_SKILLS entries with data-*/geopolitical-*) >= 5"

  - id: ROUTE-INV-002
    name: "Slash command count"
    description: "At least 23 CFA slash commands exist in .claude/commands/cfa/"
    check: "count(.claude/commands/cfa/*.md) >= 23"
