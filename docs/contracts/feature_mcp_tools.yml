# Feature Contract: MCP Tool Standards
# Enforces quality rules for MCP tool integrations

contracts:
  - id: MCP-001
    name: "Zod schemas required for tool inputs"
    description: "All MCP tool handlers must validate inputs using Zod schemas. Raw JSON parsing without validation is not permitted."
    scope:
      - "packages/mcp-server/src/**/*.ts"
      - "packages/data-mcp-server/src/**/*.ts"
      - "packages/fmp-mcp-server/src/**/*.ts"
    enforcement: build-time
    severity: error

  - id: MCP-002
    name: "No empty catch blocks"
    description: "Catch blocks must either log the error, re-throw, or return a meaningful error response. Empty catch blocks silently swallow failures."
    scope:
      - "packages/agents/src/**/*.ts"
      - "packages/mcp-server/src/**/*.ts"
      - "packages/data-mcp-server/src/**/*.ts"
      - "packages/fmp-mcp-server/src/**/*.ts"
    enforcement: build-time
    severity: error

  - id: MCP-003
    name: "Tool names must be snake_case"
    description: "All MCP tool names must use snake_case convention to match the corp-finance-mcp server registration format."
    scope:
      - "packages/mcp-server/src/**/*.ts"
      - "packages/data-mcp-server/src/**/*.ts"
      - "packages/fmp-mcp-server/src/**/*.ts"
    enforcement: build-time
    severity: error
